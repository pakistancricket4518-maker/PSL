<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>CRICLOUNGE — QUALITY CONTROL</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&display=swap" rel="stylesheet">

<!-- Video.js Base -->
<link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<!-- HLS/Dash Support -->
<script src="https://cdn.jsdelivr.net/npm/videojs-contrib-eme@5.0.1/dist/videojs-contrib-eme.min.js"></script>

<style>
:root {
  --bg: #0a0f0b; 
  --surf: rgba(18, 26, 20, 0.75); 
  --surf2: rgba(26, 38, 29, 0.5); 
  --bdr: rgba(45, 66, 51, 0.6);
  --acc: #1a8c35; 
  --acc2: #d42b2b; 
  --txt: #e6f0e8; 
  --muted: #8ba391;
  --font-main: 'Poppins', sans-serif;
  --glass-blur: blur(12px) saturate(160%);
  --glass-border: 1px solid rgba(255, 255, 255, 0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  background-image: 
    radial-gradient(circle at 50% -10%, #1a3a22 0%, transparent 40%),
    radial-gradient(circle at 0% 100%, #0d1a0f 0%, transparent 30%);
  color: var(--txt);
  font-family: var(--font-main);
  font-weight: 700;
  min-height: 100vh;
  overflow-x: hidden;
}

header {
  background: var(--surf);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: var(--glass-border);
  padding: 15px 28px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky; top: 0; z-index: 100;
}

.brand { font-size: 22px; letter-spacing: 2px; }
.brand span { color: var(--acc); text-shadow: 0 0 15px rgba(26, 140, 53, 0.4); }

.wrap { max-width: 1440px; margin: 20px auto; padding: 0 20px; }
.live-layout { display: grid; grid-template-columns: 1fr 360px; gap: 24px; }

.player-card, .channels-section {
  background: var(--surf);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: var(--glass-border);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
  position: relative;
}

.video-wrap {
  width: 100%; aspect-ratio: 16/9; background: #000;
  position: relative; overflow: hidden;
}

.video-js { width: 100%; height: 100%; font-family: var(--font-main); }

.vjs-fullscreen video { 
  object-fit: contain; 
  width: 100vw !important; 
  height: 100vh !important;
}

.vjs-stretch video { object-fit: fill !important; }
.vjs-zoom video { object-fit: cover !important; }
.vjs-padded video { transform: scale(0.9); }

.vjs-big-play-button { background-color: var(--acc) !important; border: none !important; border-radius: 50% !important; width: 2em !important; height: 2em !important; line-height: 2em !important; margin-top: -1em !important; margin-left: -1em !important; }

/* Controls Overlay with Transition */
.controls-overlay { 
  position: absolute; 
  top: 15px; 
  right: 15px;
  z-index: 2147483647; 
  display: flex;
  gap: 8px;
  padding-right: env(safe-area-inset-right);
  padding-top: env(safe-area-inset-top);
  transition: opacity 0.4s ease, visibility 0.4s;
  opacity: 1;
  visibility: visible;
}

.controls-overlay.vjs-hidden-custom {
  opacity: 0;
  visibility: hidden;
}

.controls-overlay select {
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(10px);
  color: #fff;
  border: 1px solid rgba(255, 255, 255, 0.2);
  font-family: var(--font-main);
  font-size: 11px;
  padding: 5px 10px;
  border-radius: 6px;
  cursor: pointer;
  outline: none;
  text-transform: uppercase;
}

#pad-regulator, #aspect-regulator { display: none; }

.vjs-fullscreen #pad-regulator, 
.vjs-fullscreen #aspect-regulator { display: block; }

.player-infobar { padding: 24px; background: rgba(0,0,0,0.25); }
#current-ch-name { font-size: 24px; margin-bottom: 4px; color: var(--txt); }
.ch-meta { font-size: 11px; color: var(--acc); letter-spacing: 2px; opacity: 0.8; }

.ch-list-head { padding: 12px 20px; background: var(--surf2); border-bottom: var(--glass-border); font-size: 12px; }
.ch-list { overflow-y: auto; max-height: 480px; }
.ch-list::-webkit-scrollbar { width: 4px; }
.ch-list::-webkit-scrollbar-thumb { background: var(--acc); border-radius: 10px; }

.ch-row {
  display: flex; align-items: center; gap: 15px; padding: 10px 15px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
  cursor: pointer; transition: all 0.3s ease;
  border-right: 5px solid transparent;
}

.ch-row:hover { background: rgba(255, 255, 255, 0.05); }
.ch-row.active {
  background: linear-gradient(-90deg, rgba(26, 140, 53, 0.25) 0%, transparent 100%);
  border-right: 5px solid var(--acc);
}

.ch-row-art {
  width: 60px; height: 40px; background: rgba(255,255,255,0.03);
  border-radius: 8px; padding: 4px; border: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}

.ch-row-art img { width: 100%; height: 100%; object-fit: contain; }
.ch-name { font-size: 13px; flex-grow: 1; }

@media(max-width:1024px) { .live-layout { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<header>
  <div class="brand">CRIC<span>LOUNGE</span></div>
</header>

<div class="wrap">
  <div class="live-layout">
    <div class="player-section">
      <div class="player-card">
        <div class="video-wrap" id="v-container">
          <video id="video-player" class="video-js vjs-default-skin" controls preload="auto" autoplay></video>
          <div class="controls-overlay" id="custom-controls">
            <select id="pad-regulator">
                <option value="none">FIT SCREEN</option>
                <option value="padded">PADDED</option>
            </select>
            <select id="aspect-regulator">
              <option value="default">ORIGINAL</option>
              <option value="stretch">STRETCH</option>
              <option value="zoom">ZOOM 16:9</option>
            </select>
            <select id="quality-regulator">
              <option value="auto">AUTO QUALITY</option>
            </select>
          </div>
        </div>
        <div class="player-infobar">
          <h2 id="current-ch-name">SELECT_CHANNEL</h2>
          <p class="ch-meta">Pakistan Super League 2026</p>
        </div>
      </div>
    </div>
    <div class="channels-section">
      <div class="ch-list-head">LIVE_FEED</div>
      <div class="ch-list" id="channel-list"></div>
    </div>
  </div>
</div>

<script>
  const CHANNELS = [
{ 
        id: 2, 
        name: "Worldwide Stream", 
        url: "https://psl.bigbaat.app/out/v1/f342445c31dd475bbf30c7304dbad14f/index.m3u8", 
        key: "null",
        logo: "https://eapi.pcloud.com/getpubthumb?code=XZnKkvZzlzsJg3FrQLNpWbMc0YmDV3bzWWV&linkpassword=&size=2460x816&crop=0&type=auto" 
    },
    { 
        id: 3, 
        name: "Tamasha Pro English (PAK)", 
        url: "https://tencentcdn5.tamashaweb.com/v1/0196159eeff41eb4611d121c76c781/0196159f51bb1ea5064913eb2a83ea/TMSH_U1_WEB.m3u8", 
        key: "null",
        logo: "https://eapi.pcloud.com/getpubthumb?code=XZe0TAZ4VUePXYN8rSafbQdahHlB5pkov5V&linkpassword=&size=1828x1828&crop=0&type=auto" 
    },
{ 
        id: 4, 
        name: "Tamasha Pro Urdu (PAK)", 
        url: "https://alibabacdn11.tamashaweb.com/alibaba11/alibaba11stream_alibaba-11.m3u8?aliyunols=on&lhs_playback_mode=1&lhs_start_unix_s_0=1775486400", 
        key: "null",
        logo: "https://eapi.pcloud.com/getpubthumb?code=XZe0TAZ4VUePXYN8rSafbQdahHlB5pkov5V&linkpassword=&size=1828x1828&crop=0&type=auto" 
    },
{ 
        id: 5, 
        name: "Ten Sports (PAK)", 
        url: "https://tapmadlive.akamaized.net/tapmadold/tensports.smil/playlist.m3u8", 
        key: "null",
        logo: "https://eapi.pcloud.com/getpubthumb?code=XZbQSwZsoPpvwKp48bVzqA3dWFkzJi7ybLX&linkpassword=undefined&size=1000x219&crop=0&type=auto" 
    },
{ 
        id: 6, 
        name: "ESPN (AUS VPN)", 
        url: "https://live1-761f422bb93edb7b.fastly.foxtelgroupcdn.net.au/out/v1/adbaa04bfe5441199a037b7a78e6e62a/index.mpd", 
        key: "4fd27d05c1bd43e88496c9c89770faaf:1b53ff84f9fefe4266920ec38376b9c1",
        logo: "https://images.channel5.eu/eGqxKQFYBvdaZ1gtJTHXn44tRBP25APwLvpWnRekeFAXNlW_IDQrMCNYX5qnzdAnRGfyyRXO6YRnV9j-sk3wOg.png" 
    },
{ 
        id: 6, 
        name: "ESPN 2 (AUS VPN)", 
        url: "https://live1-814bffb9b389f652-cf.foxtelgroupcdn.net.au/out/v1/4a34a24349314cc3a1e84ee31bf3d224/index.mpd", 
        key: "ad04e6d2bdb54dc2a35237ab66e0f29e:78d37cc16c351190ed202758adf417f3",
        logo: "https://images.channel5.eu/eGqxKQFYBvdaZ1gtJTHXn44tRBP25APwLvpWnRekeFAXNlW_IDQrMCNYX5qnzdAnRGfyyRXO6YRnV9j-sk3wOg.png" 
    }
    
  ];

  let player;
  let hideTimer;

  function initPlayer() {
    player = videojs('video-player', {
      fluid: true,
      muted: false,
      html5: { vhs: { overrideNative: true }, nativeAudioTracks: false, nativeVideoTracks: false }
    });

    player.eme();
    player.on('loadedmetadata', updateQualityMenu);

    const overlay = document.getElementById('custom-controls');

    const resetTimer = () => {
      overlay.classList.remove('vjs-hidden-custom');
      clearTimeout(hideTimer);
      if (player.isFullscreen()) {
        hideTimer = setTimeout(() => {
          overlay.classList.add('vjs-hidden-custom');
        }, 3000);
      }
    };

    // Show on tap/click/any activity
    player.on('touchstart', resetTimer);
    player.on('mousedown', resetTimer);
    player.on('mousemove', resetTimer);

    player.on('fullscreenchange', function() {
      if (player.isFullscreen()) {
        player.el().appendChild(overlay);
        resetTimer();
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock('landscape').catch(() => {});
        }
      } else {
        document.getElementById('v-container').appendChild(overlay);
        overlay.classList.remove('vjs-hidden-custom');
        clearTimeout(hideTimer);
        if (screen.orientation && screen.orientation.unlock) {
          screen.orientation.unlock();
        }
      }
    });

    renderChannels();
    selectChannel(0);

    document.getElementById('quality-regulator').addEventListener('change', (e) => {
      const levels = player.qualityLevels();
      for (let i = 0; i < levels.length; i++) {
        levels[i].enabled = (e.target.value === 'auto' || i === parseInt(e.target.value));
      }
    });

    document.getElementById('aspect-regulator').addEventListener('change', (e) => {
      const p = player.el();
      p.classList.remove('vjs-stretch', 'vjs-zoom');
      if(e.target.value !== 'default') p.classList.add('vjs-' + e.target.value);
    });

    document.getElementById('pad-regulator').addEventListener('change', (e) => {
      const p = player.el();
      p.classList.toggle('vjs-padded', e.target.value === 'padded');
    });
  }

  async function selectChannel(index) {
    const ch = CHANNELS[index];
    const type = ch.url.includes('.mpd') ? 'application/dash+xml' : 'application/x-mpegURL';
    let keySystems = {};
    if (ch.key && ch.key.includes(':')) {
      const [kid, key] = ch.key.split(':');
      keySystems['org.w3.clearkey'] = { clearkeys: { [kid.replace(/-/g, '')]: key } };
    }
    player.src({ src: ch.url, type: type, keySystems: keySystems });
    document.getElementById('current-ch-name').innerText = ch.name;
    document.querySelectorAll('.ch-row').forEach((el, i) => el.classList.toggle('active', i === index));
    player.play().catch(() => {});
  }

  function updateQualityMenu() {
    const menu = document.getElementById('quality-regulator');
    const levels = player.qualityLevels();
    if(levels.length === 0) { setTimeout(updateQualityMenu, 1000); return; }
    menu.innerHTML = '<option value="auto">AUTO QUALITY</option>';
    for (let i = 0; i < levels.length; i++) {
      const lvl = levels[i];
      const bitrate = lvl.bitrate ? (lvl.bitrate / 1000000).toFixed(1) + ' Mbps' : '';
      const label = `${lvl.height ? lvl.height + 'p' : 'Level ' + i} ${bitrate ? '['+bitrate+']' : ''}`;
      const opt = document.createElement('option');
      opt.value = i;
      opt.innerText = label;
      menu.appendChild(opt);
    }
  }

  function renderChannels() {
    const container = document.getElementById('channel-list');
    container.innerHTML = CHANNELS.map((ch, index) => `
      <div class="ch-row" onclick="selectChannel(${index})">
        <div class="ch-row-art"><img src="${ch.logo}" alt="${ch.name}"></div>
        <div class="ch-name" style="font-size:14px;">${ch.name}</div>
      </div>
    `).join('');
  }

  document.addEventListener('DOMContentLoaded', initPlayer);
</script>
</body>
</html>
